<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Census Block Mapper - OSM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Geoman (Drawing Tools) -->
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 10; }
        
        /* Decoupled Reference Image Overlay */
        #image-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let map events pass through unless dragging */
            z-index: 400;
            overflow: hidden;
            display: none;
        }
        #reference-image {
            position: absolute;
            transform-origin: center center;
            cursor: grab;
            pointer-events: auto; /* Allow interaction with the image itself */
        }
        #reference-image:active {
            cursor: grabbing;
        }
        
        /* Custom markers for Census Types */
        .census-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: black;
            border: 2px solid black;
            background: white;
        }
        .marker-pucca { border-radius: 2px; }
        .marker-kutcha { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); padding-top: 5px; }
        .marker-nr { background: repeating-linear-gradient(45deg, #ccc, #ccc 2px, #fff 2px, #fff 4px); }
    </style>
</head>
<body class="flex h-screen bg-slate-900 font-sans text-slate-200">

    <!-- Control Panel -->
    <aside class="w-80 bg-slate-800 flex flex-col h-full border-r border-slate-700 shadow-xl z-50 overflow-y-auto">
        <div class="p-4 border-b border-slate-700">
            <h1 class="text-lg font-bold text-white">Census Map Interface</h1>
            <p class="text-xs text-slate-400 mt-1">OSM + Geoman Integration</p>
        </div>

        <div class="p-4 flex flex-col gap-6">
            
            <!-- Step 1: Data -->
            <div>
                <h2 class="text-sm font-semibold text-slate-300 mb-2 uppercase tracking-wide">1. Data Coordinates</h2>
                <label class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 px-4 rounded cursor-pointer transition">
                    Upload JSON File
                    <input type="file" id="json-upload" accept=".json" class="hidden">
                </label>
                <div id="data-stats" class="text-xs text-slate-400 mt-2 hidden"></div>
            </div>

            <hr class="border-slate-700">

            <!-- Step 2: Overlay -->
            <div>
                <h2 class="text-sm font-semibold text-slate-300 mb-2 uppercase tracking-wide">2. Reference Overlay</h2>
                <label class="block w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white text-sm py-2 px-4 rounded cursor-pointer transition mb-3">
                    Upload Map Image
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                </label>
                
                <!-- Image Controls -->
                <div id="image-controls" class="hidden flex-col gap-3 bg-slate-900 p-3 rounded border border-slate-700">
                    <div class="flex justify-between items-center">
                        <label class="text-xs">Visibility</label>
                        <input type="checkbox" id="toggle-image" checked class="cursor-pointer">
                    </div>
                    
                    <div>
                        <label class="text-xs flex justify-between">Opacity <span id="val-opacity">0.5</span></label>
                        <input type="range" id="ctrl-opacity" min="0" max="1" step="0.05" value="0.5" class="w-full">
                    </div>
                    
                    <div>
                        <label class="text-xs flex justify-between">Scale <span id="val-scale">1.0</span></label>
                        <input type="range" id="ctrl-scale" min="0.1" max="5" step="0.05" value="1" class="w-full">
                    </div>
                    
                    <div>
                        <label class="text-xs flex justify-between">Rotation <span id="val-rotate">0°</span></label>
                        <input type="range" id="ctrl-rotate" min="-180" max="180" step="1" value="0" class="w-full">
                    </div>

                    <p class="text-[10px] text-slate-400 leading-tight mt-1">
                        Click and drag the image on the map to position it. Use the draw tools on the left of the map to trace boundaries.
                    </p>
                </div>
            </div>

            <hr class="border-slate-700">

            <!-- Utilities -->
            <div>
                <h2 class="text-sm font-semibold text-slate-300 mb-2 uppercase tracking-wide">3. Utilities</h2>
                <button id="clear-cache" class="w-full bg-red-900/50 hover:bg-red-900 text-red-200 border border-red-800 text-xs py-2 px-4 rounded transition">
                    Clear Saved Map Location
                </button>
            </div>
        </div>
    </aside>

    <!-- Map Area -->
    <main class="flex-1 relative bg-slate-950">
        <div id="map"></div>
        <div id="image-overlay-container">
            <img id="reference-image" src="" alt="Reference Overlay">
        </div>
    </main>

    <script>
        // --- Map Initialization ---
        // Default to a central coordinate if localStorage is empty
        const defaultCenter = [9.736, 76.518]; // Fallback based on your dataset
        let initialCenter = defaultCenter;
        let initialZoom = 16;

        // Requirement 4: Restore previous location from localStorage
        const savedView = localStorage.getItem('censusMapState');
        if (savedView) {
            try {
                const state = JSON.parse(savedView);
                initialCenter = state.center;
                initialZoom = state.zoom;
            } catch (e) {
                console.error("Corrupted localStorage state.");
            }
        }

        const map = L.map('map').setView(initialCenter, initialZoom);

        // Requirement 2: OpenStreetMap Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 22,
            maxNativeZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Initialize Geoman Drawing Tools (Requirement 3: Boundaries)
        map.pm.addControls({
            position: 'topleft',
            drawCircleMarker: false,
            drawPolyline: true,
            drawRectangle: true,
            drawPolygon: true,
            drawCircle: false,
            editMode: true,
            dragMode: true,
            cutPolygon: false,
            removalMode: true,
        });

        // Save map state on movement to persist across reloads
        map.on('moveend', () => {
            const state = {
                center: map.getCenter(),
                zoom: map.getZoom()
            };
            localStorage.setItem('censusMapState', JSON.stringify(state));
        });

        // --- Handle JSON Upload (Requirement 1) ---
        let markersLayer = L.layerGroup().addTo(map);

        document.getElementById('json-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    plotDataOnMap(data);
                } catch (err) {
                    alert("Failed to parse JSON. Ensure the format matches the census structure array.");
                }
            };
            reader.readAsText(file);
        });

        function plotDataOnMap(data) {
            markersLayer.clearLayers();
            const bounds = [];

            data.forEach(item => {
                if (!item.coords || item.coords.length !== 2) return;
                
                const lat = item.coords[0];
                const lng = item.coords[1];
                bounds.push([lat, lng]);

                // Determine CSS classes based on structural properties
                let baseClass = 'census-marker ';
                if (item.type === 'pucca-house') baseClass += 'marker-pucca ';
                if (item.type === 'kutcha-house') baseClass += 'marker-kutcha ';
                if (item.subtype === 'nr') baseClass += 'marker-nr ';

                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="${baseClass}" style="width:24px; height:24px;">${item.name || ''}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const popupContent = `
                    <div class="text-sm">
                        <strong>Bldg No:</strong> ${item.name}<br>
                        <strong>Type:</strong> ${item.type}<br>
                        <strong>Subtype:</strong> ${item.subtype === 'res' ? 'Residential' : 'Non-Residential'}<br>
                        <strong>Houses (Count):</strong> ${item.censusCount}<br>
                        <strong>Coords:</strong> ${lat.toFixed(5)}, ${lng.toFixed(5)}<br>
                        ${item.note ? `<strong>Note:</strong> ${item.note}` : ''}
                    </div>
                `;

                L.marker([lat, lng], { icon: icon }).bindPopup(popupContent).addTo(markersLayer);
            });

            if (bounds.length > 0) {
                const mapBounds = L.latLngBounds(bounds);
                map.fitBounds(mapBounds, { padding: [50, 50] });
                
                // Update stats UI
                const stats = document.getElementById('data-stats');
                stats.classList.remove('hidden');
                stats.innerHTML = `Plotted <strong>${bounds.length}</strong> structures.`;
            }
        }

        // --- Handle Image Overlay & Transformations (Requirement 3) ---
        const imageUpload = document.getElementById('image-upload');
        const imgContainer = document.getElementById('image-overlay-container');
        const refImage = document.getElementById('reference-image');
        const imgControls = document.getElementById('image-controls');

        // State variables for image transformations
        let imgState = {
            x: 0, y: 0, scale: 1, rotate: 0, opacity: 0.5
        };

        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                refImage.src = event.target.result;
                imgContainer.style.display = 'block';
                imgControls.classList.remove('hidden');
                imgControls.classList.add('flex');
                
                // Reset position to center of screen
                refImage.onload = () => {
                    const rect = imgContainer.getBoundingClientRect();
                    imgState.x = (rect.width - refImage.width) / 2;
                    imgState.y = (rect.height - refImage.height) / 2;
                    updateImageTransform();
                }
            };
            reader.readAsDataURL(file);
        });

        // UI Listeners for transformation sliders
        document.getElementById('toggle-image').addEventListener('change', (e) => {
            refImage.style.display = e.target.checked ? 'block' : 'none';
        });

        document.getElementById('ctrl-opacity').addEventListener('input', (e) => {
            imgState.opacity = e.target.value;
            document.getElementById('val-opacity').innerText = imgState.opacity;
            updateImageTransform();
        });

        document.getElementById('ctrl-scale').addEventListener('input', (e) => {
            imgState.scale = e.target.value;
            document.getElementById('val-scale').innerText = imgState.scale;
            updateImageTransform();
        });

        document.getElementById('ctrl-rotate').addEventListener('input', (e) => {
            imgState.rotate = e.target.value;
            document.getElementById('val-rotate').innerText = imgState.rotate + '°';
            updateImageTransform();
        });

        function updateImageTransform() {
            refImage.style.opacity = imgState.opacity;
            refImage.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale}) rotate(${imgState.rotate}deg)`;
        }

        // Dragging physics for the decoupled image overlay
        let isDragging = false;
        let startX, startY;

        refImage.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - imgState.x;
            startY = e.clientY - imgState.y;
            e.preventDefault(); // Prevent default image dragging behavior
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            imgState.x = e.clientX - startX;
            imgState.y = e.clientY - startY;
            updateImageTransform();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Utility: Clear local storage cache
        document.getElementById('clear-cache').addEventListener('click', () => {
            localStorage.removeItem('censusMapState');
            alert('Saved location cleared. Page will reset to default center on next reload.');
        });
    </script>
</body>
</html>
